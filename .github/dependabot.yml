version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      # codeql-action's init/autobuild/analyze subpaths are separate
      # dependencies to dependabot but must stay on the same version —
      # skew makes analyze reject init's config file (broke CI: #895
      # bumped only init to 4.37.3 while analyze stayed on 4.37.0).
      codeql-action:
        patterns:
          - "github/codeql-action*"
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Revisit when vue-tsc + typescript-eslint support TypeScript 7.
      # TS 7 cannot even `npm ci`: typescript-eslint peer-caps at <6.1.0 and
      # vue-tsc fails on TS 7's package exports (see PR #869).
      - dependency-name: "typescript"
        versions: ["7.x"]
    groups:
      frontend-dependencies:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      website-dependencies:
        patterns:
          - "*"
