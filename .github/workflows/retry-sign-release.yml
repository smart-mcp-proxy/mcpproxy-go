name: Retry Sign & Release

# Use this workflow when the main Release workflow fails due to SignPath
# signing timeout (missed manual approval). It downloads build artifacts
# from the failed run, re-submits Windows EXEs for signing, assembles the
# same full artifact set that release.yml produces, and runs update-homebrew
# + publish-linux-repos so no distribution channel is skipped.
#
# FIXED (MCP-2905): corrected artifact download patterns, added Linux packages,
# SBOM/CHANGELOG/checksums/cosign, asset parity assertion, update-homebrew,
# publish-linux-repos, and SLSA provenance jobs.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.2.3)'
        required: true
        type: string
      run_id:
        description: 'Failed Release workflow run ID (from Actions URL)'
        required: true
        type: string

permissions:
  contents: write
  actions: read
  id-token: write  # cosign keyless signing + SLSA provenance

env:
  GITHUB_ENVIRONMENT: production

jobs:
  sign-windows:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Download unsigned installer from original run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p unsigned
          echo "Downloading unsigned-installer-windows-${{ matrix.arch }} from run ${{ inputs.run_id }}..."
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --name unsigned-installer-windows-${{ matrix.arch }} \
            --dir unsigned
          echo "Downloaded files:"
          ls -la unsigned/

      - name: Re-upload for SignPath
        id: reupload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: signpath-input-windows-${{ matrix.arch }}
          path: unsigned/*.exe

      - name: Submit to SignPath for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd  # v2.2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '84efd51b-c11c-4a85-82e6-7c3b1157d7ca'
          project-slug: 'mcpproxy-go'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial'
          github-artifact-id: '${{ steps.reupload.outputs.artifact-id }}'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed

      - name: Prepare signed installer
        run: |
          VERSION="${{ inputs.tag }}"
          ARCH="${{ matrix.arch }}"
          TARGET="mcpproxy-setup-${VERSION}-${ARCH}.exe"

          echo "Preparing signed installer..."
          cd signed
          ls -la

          if [ -f "$TARGET" ]; then
            echo "Signed installer already named correctly: $TARGET"
          else
            SIGNED_EXE=$(find . -name "*.exe" -type f | head -1)
            if [ -n "$SIGNED_EXE" ]; then
              mv "$SIGNED_EXE" "$TARGET"
              echo "Renamed to: $TARGET"
            else
              echo "No signed .exe found in SignPath output"
              exit 1
            fi
          fi

      - name: Upload signed Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: installer-windows-${{ matrix.arch }}
          path: signed/mcpproxy-setup-${{ inputs.tag }}-${{ matrix.arch }}.exe

  release:
    needs: sign-windows
    runs-on: ubuntu-latest
    environment: production
    outputs:
      hashes: ${{ steps.checksums.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Download all artifacts from original run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          echo "Downloading artifacts from original run ${{ inputs.run_id }}..."

          # Versioned archives: mcpproxy-X.Y.Z-{os}-{arch}.{tar.gz|zip}
          # (artifact name pattern: versioned-personal-{os}-{arch})
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'versioned-personal-*' || echo "No versioned archive artifacts found"

          # Latest-alias archives: mcpproxy-latest-{os}-{arch}.{tar.gz|zip}
          # (artifact name pattern: latest-personal-{os}-{arch})
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'latest-personal-*' || echo "No latest archive artifacts found"

          # Linux .deb and .rpm packages
          # (artifact name pattern: linux-packages-{arch})
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'linux-packages-*' || echo "No Linux package artifacts found"

          # macOS installer DMGs (signed + notarized)
          # (artifact name pattern: installers-{os}-{arch})
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'installers-*' || echo "No macOS installer artifacts found"

          # Release notes (AI-generated by original run)
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'release-notes' || echo "No release notes artifact found"

          echo "Downloaded artifacts:"
          find dist -type f | head -60

      - name: Download signed Windows installers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          pattern: installer-windows-*

      - name: Reorganize files
        run: |
          VERSION="${{ inputs.tag }}"
          mkdir -p release-files

          # Copy archives (tar.gz and zip files)
          find dist -name "*.tar.gz" -o -name "*.zip" | while read file; do
            filename=$(basename "$file")
            cp "$file" "release-files/$filename"
          done

          # Copy Linux .deb and .rpm packages
          find dist -path "*/linux-packages-*" \( -name "*.deb" -o -name "*.rpm" \) | while read pkg_file; do
            filename=$(basename "$pkg_file")
            echo "Found Linux package: $filename"
            cp "$pkg_file" "release-files/$filename"
          done

          # Copy Windows installer files (.exe)
          find dist -path "*/installer-windows-*" -name "*.exe" | while read installer_file; do
            filename=$(basename "$installer_file")
            echo "Found Windows installer: $filename"
            cp "$installer_file" "release-files/$filename"
          done

          # Handle installer files (DMG) and notarization submissions
          mkdir -p pending-notarizations
          find dist -path "*/installers-*" -name "*.dmg" | while read installer_file; do
            filename=$(basename "$installer_file")
            submission_id_file="${installer_file}.submission_id"
            if [ -f "$submission_id_file" ]; then
              SUBMISSION_ID=$(cat "$submission_id_file")
              if [ -n "$SUBMISSION_ID" ] && [ "$SUBMISSION_ID" != "null" ] && [ ${#SUBMISSION_ID} -gt 10 ]; then
                echo "Found valid pending notarization for $filename (ID: $SUBMISSION_ID)"
                cp "$installer_file" "release-files/$filename"
                cat > "pending-notarizations/${filename}.pending" << EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "file_name": "$filename",
            "version": "$VERSION",
            "submitted_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
              else
                cp "$installer_file" "release-files/$filename"
              fi
            else
              cp "$installer_file" "release-files/$filename"
            fi
          done

      - name: Set version variable
        run: |
          VERSION="${{ inputs.tag }}"
          echo "CLEAN_VERSION=${VERSION#v}" >> $GITHUB_ENV

      # Generate SPDX SBOM from source tree at the release tag (mirrors release.yml WP-C2)
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: release-files/mcpproxy-${{ env.CLEAN_VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Generate cumulative CHANGELOG with git-cliff (mirrors release.yml WP-C4)
      - name: Generate CHANGELOG (git-cliff)
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: release-files/CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fail loudly if the assembled set is missing platforms or package types.
      # A complete release has ≥22 files at this point:
      #   6 versioned archives + 6 latest archives + 4 Linux packages
      #   + 2 Windows EXEs + 2 macOS DMGs + 1 SBOM + 1 CHANGELOG = 22
      # (checksums.txt and cosign bundle are added in subsequent steps)
      - name: Assert minimum asset count
        run: |
          MIN_ASSETS=22
          ASSET_COUNT=$(find release-files -maxdepth 1 -type f | wc -l)
          echo "Asset count: $ASSET_COUNT (minimum: $MIN_ASSETS)"
          if [ "$ASSET_COUNT" -lt "$MIN_ASSETS" ]; then
            echo "❌ INCOMPLETE RELEASE: only $ASSET_COUNT assets assembled, expected ≥ $MIN_ASSETS"
            echo ""
            echo "Expected breakdown:"
            echo "  6 versioned archives  (versioned-personal-* pattern from original run)"
            echo "  6 latest archives     (latest-personal-* pattern from original run)"
            echo "  4 Linux packages      (linux-packages-* pattern from original run)"
            echo "  2 Windows EXEs        (installer-windows-* from this run's sign-windows job)"
            echo "  2 macOS DMGs          (installers-* pattern from original run)"
            echo "  1 SBOM (.spdx.json)"
            echo "  1 CHANGELOG.md"
            echo ""
            echo "Files found:"
            ls -la release-files/
            exit 1
          fi
          echo "✅ Asset count OK: $ASSET_COUNT"

      - name: Generate checksums
        id: checksums
        run: |
          cd release-files
          find . -maxdepth 1 -type f ! -name 'checksums.txt' ! -name 'checksums.txt.cosign.bundle' -printf '%P\n' \
            | sort | xargs -r sha256sum > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt
          echo "hashes=$(base64 -w0 checksums.txt)" >> "$GITHUB_OUTPUT"

      - name: List files for upload
        run: |
          echo "Files to upload:"
          ls -la release-files/
          echo "Pending notarizations:"
          ls -la pending-notarizations/ || echo "No pending notarizations"

      - name: Generate release notes
        id: notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          VERSION="${{ inputs.tag }}"

          # Try to use notes from original run
          NOTES_FILE=$(find dist -name "RELEASE_NOTES-*.md" -type f | head -1)
          if [ -n "$NOTES_FILE" ]; then
            echo "Using release notes from original run"
            NOTES=$(cat "$NOTES_FILE")
          else
            # Fallback: generate from commit history
            PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              COMMITS=$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s" --no-merges | head -50)
            else
              COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -50)
            fi
            NOTES="## Changes

          ${COMMITS}"
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release with binaries
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ inputs.tag }}
          files: release-files/*
          body: |
            ${{ steps.notes.outputs.notes }}

            ---

            ## Download Installers

            | Platform | Download | Notes |
            |----------|----------|-------|
            | **macOS (Apple Silicon)** | [**Download DMG**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-${{ env.CLEAN_VERSION }}-darwin-arm64-installer.dmg) | Signed & Notarized - Recommended for M1/M2/M3/M4 |
            | **macOS (Intel)** | [**Download DMG**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-${{ env.CLEAN_VERSION }}-darwin-amd64-installer.dmg) | Signed & Notarized |
            | **Windows (64-bit)** | [**Download Setup**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-setup-${{ inputs.tag }}-amd64.exe) | Setup wizard |
            | **Windows (ARM64)** | [**Download Setup**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-setup-${{ inputs.tag }}-arm64.exe) | For ARM Windows devices |
            | **Linux Debian/Ubuntu (AMD64)** | [**Download .deb**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy_${{ env.CLEAN_VERSION }}_amd64.deb) | `sudo apt install ./mcpproxy_*.deb` |
            | **Linux Debian/Ubuntu (ARM64)** | [**Download .deb**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy_${{ env.CLEAN_VERSION }}_arm64.deb) | For ARM64 (Raspberry Pi etc.) |
            | **Linux Fedora/RHEL (AMD64)** | [**Download .rpm**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-${{ env.CLEAN_VERSION }}-1.x86_64.rpm) | `sudo dnf install ./mcpproxy-*.rpm` |
            | **Linux Fedora/RHEL (ARM64)** | [**Download .rpm**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-${{ env.CLEAN_VERSION }}-1.aarch64.rpm) | For ARM64 |
            | **Linux (AMD64) — tarball** | [**Download tar.gz**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-${{ env.CLEAN_VERSION }}-linux-amd64.tar.gz) | Binary only |
            | **Linux (ARM64) — tarball** | [**Download tar.gz**](https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/mcpproxy-${{ env.CLEAN_VERSION }}-linux-arm64.tar.gz) | Binary only |

            **Homebrew (macOS/Linux):**
            ```bash
            brew install smart-mcp-proxy/mcpproxy/mcpproxy
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless cosign signature — OIDC identity from the GitHub Actions JWT.
      # id-token: write is granted at the workflow level.
      - name: Sign checksums (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --bundle release-files/checksums.txt.cosign.bundle \
            release-files/checksums.txt

      - name: Upload cosign bundle to release
        run: |
          gh release upload "${{ inputs.tag }}" \
            release-files/checksums.txt.cosign.bundle \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pending notarizations
        if: hashFiles('pending-notarizations/*.pending') != ''
        run: |
          for pending_file in pending-notarizations/*.pending; do
            if [ -f "$pending_file" ]; then
              echo "Uploading pending notarization: $(basename "$pending_file")"
              gh release upload "${{ inputs.tag }}" "$pending_file" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SLSA v1 provenance attestation — mirrors release.yml WP-C3.
  # upload-tag-name directs the generator to the correct release (needed because
  # this workflow is triggered by workflow_dispatch on a branch, not a tag push).
  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ inputs.tag }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    if: github.repository == 'smart-mcp-proxy/mcpproxy-go' && !contains(inputs.tag, '-')

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: smart-mcp-proxy/homebrew-mcpproxy
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download platform binaries and calculate SHA256
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "Processing version: ${VERSION}"

          # Wait for GitHub release assets to propagate
          sleep 15

          # Define platforms
          PLATFORMS=("darwin-arm64" "darwin-amd64" "linux-arm64" "linux-amd64")
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Download each platform tarball and calculate SHA256
          for PLATFORM in "${PLATFORMS[@]}"; do
            TARBALL="mcpproxy-${VERSION}-${PLATFORM}.tar.gz"
            URL="${BASE_URL}/${TARBALL}"
            echo "Downloading ${PLATFORM}: ${URL}"

            # Try downloading with retries
            for i in {1..5}; do
              echo "  Attempt ${i}/5..."
              if curl -fsSL "${URL}" -o "${TARBALL}"; then
                echo "  Download successful"
                break
              else
                echo "  Download failed, retrying in 10 seconds..."
                sleep 10
              fi

              if [ $i -eq 5 ]; then
                echo "All download attempts failed for ${PLATFORM}"
                curl -I "${URL}" || true
                exit 1
              fi
            done

            # Calculate SHA256 and export as environment variable
            SHA=$(sha256sum "${TARBALL}" | cut -d' ' -f1)
            VAR_NAME="SHA256_$(echo ${PLATFORM} | tr '-' '_' | tr '[:lower:]' '[:upper:]')"
            echo "${VAR_NAME}=${SHA}" >> $GITHUB_ENV
            echo "  SHA256: ${SHA}"

            # Clean up tarball
            rm -f "${TARBALL}"
          done

          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Generate Homebrew formula
        run: |
          cd tap
          mkdir -p Formula

          cat > Formula/mcpproxy.rb << 'FORMULA_EOF'
          class Mcpproxy < Formula
            desc "Smart MCP Proxy - Intelligent tool discovery and proxying for MCP servers"
            homepage "https://github.com/smart-mcp-proxy/mcpproxy-go"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/smart-mcp-proxy/mcpproxy-go/releases/download/v${VERSION}/mcpproxy-${VERSION}-darwin-arm64.tar.gz"
                sha256 "${SHA256_DARWIN_ARM64}"
              else
                url "https://github.com/smart-mcp-proxy/mcpproxy-go/releases/download/v${VERSION}/mcpproxy-${VERSION}-darwin-amd64.tar.gz"
                sha256 "${SHA256_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/smart-mcp-proxy/mcpproxy-go/releases/download/v${VERSION}/mcpproxy-${VERSION}-linux-arm64.tar.gz"
                sha256 "${SHA256_LINUX_ARM64}"
              else
                url "https://github.com/smart-mcp-proxy/mcpproxy-go/releases/download/v${VERSION}/mcpproxy-${VERSION}-linux-amd64.tar.gz"
                sha256 "${SHA256_LINUX_AMD64}"
              end
            end

            def install
              bin.install "mcpproxy"
              bin.install "mcpproxy-tray" if OS.mac? && File.exist?("mcpproxy-tray")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mcpproxy --version")
            end
          end
          FORMULA_EOF

          # Remove the 10-space YAML indentation from the formula
          sed -i 's/^          //' Formula/mcpproxy.rb

          # Substitute environment variables
          sed -i "s/\${VERSION}/${VERSION}/g" Formula/mcpproxy.rb
          sed -i "s/\${SHA256_DARWIN_ARM64}/${SHA256_DARWIN_ARM64}/g" Formula/mcpproxy.rb
          sed -i "s/\${SHA256_DARWIN_AMD64}/${SHA256_DARWIN_AMD64}/g" Formula/mcpproxy.rb
          sed -i "s/\${SHA256_LINUX_ARM64}/${SHA256_LINUX_ARM64}/g" Formula/mcpproxy.rb
          sed -i "s/\${SHA256_LINUX_AMD64}/${SHA256_LINUX_AMD64}/g" Formula/mcpproxy.rb

          echo "Formula created successfully:"
          cat Formula/mcpproxy.rb

      - name: Download installer DMGs and calculate SHA256 for cask
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          for ARCH in arm64 amd64; do
            DMG="mcpproxy-${VERSION}-darwin-${ARCH}-installer.dmg"
            URL="${BASE_URL}/${DMG}"
            echo "Downloading ${DMG}..."
            for i in {1..5}; do
              echo "  Attempt ${i}/5..."
              if curl -fsSL "${URL}" -o "${DMG}"; then
                echo "  Download successful"
                break
              else
                echo "  Download failed, retrying in 10 seconds..."
                sleep 10
              fi
              if [ $i -eq 5 ]; then
                echo "All download attempts failed for ${DMG}"
                curl -I "${URL}" || true
                exit 1
              fi
            done
            SHA=$(sha256sum "${DMG}" | cut -d' ' -f1)
            VAR_NAME="SHA256_CASK_$(echo ${ARCH} | tr '[:lower:]' '[:upper:]')"
            echo "${VAR_NAME}=${SHA}" >> $GITHUB_ENV
            echo "  SHA256: ${SHA}"
            rm -f "${DMG}"
          done

      - name: Update Homebrew cask
        run: |
          cd tap
          mkdir -p Casks
          CASK_FILE="Casks/mcpproxy.rb"

          if [ ! -f "${CASK_FILE}" ]; then
            echo "Cask file not found at ${CASK_FILE}, skipping cask update"
            exit 0
          fi

          # Bump version and both sha256 values in place
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "${CASK_FILE}"
          # arm64 sha256 is the first occurrence, amd64 is the second
          sed -i "0,/sha256 \"[^\"]*\"/{s/sha256 \"[^\"]*\"/sha256 \"${SHA256_CASK_ARM64}\"/}" "${CASK_FILE}"
          sed -i "0,/sha256 \"${SHA256_CASK_ARM64}\"/{b}; s/sha256 \"[^\"]*\"/sha256 \"${SHA256_CASK_AMD64}\"/" "${CASK_FILE}"

          echo "Cask updated:"
          cat "${CASK_FILE}"

      - name: Commit and push changes
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mcpproxy.rb Casks/mcpproxy.rb

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update mcpproxy to ${VERSION} (pre-built binaries)"
            git push
            echo "Changes committed and pushed successfully"
          fi

  # Publish signed apt/yum repositories to Cloudflare R2 (mirrors release.yml)
  publish-linux-repos:
    needs: [release]
    if: github.repository == 'smart-mcp-proxy/mcpproxy-go' && !contains(inputs.tag, '-')
    runs-on: ubuntu-latest
    environment: production

    env:
      APT_BUCKET: mcpproxy-apt
      RPM_BUCKET: mcpproxy-rpm
      APT_BASE_URL: https://apt.mcpproxy.app
      RPM_BASE_URL: https://rpm.mcpproxy.app
      GPG_KEY_ID: ${{ vars.PACKAGES_GPG_KEY_ID }}
      RETAIN_N: "10"
      AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      AWS_DEFAULT_REGION: auto
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PACKAGES_GPG_PRIVATE_KEY: ${{ secrets.PACKAGES_GPG_PRIVATE_KEY }}
      PACKAGES_GPG_PASSPHRASE: ${{ secrets.PACKAGES_GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ inputs.tag }}

      - name: Install repo tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils createrepo-c gnupg rpm
          aws --version

      # In the retry workflow the packages are in the *original* failed run,
      # not this run's artifacts, so we use gh run download instead of
      # actions/download-artifact.  Flatten subdirs to match the flat layout
      # that publish.sh expects (same as actions/download-artifact merge-multiple: true).
      - name: Download Linux package artifacts from original run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p raw-packages release-artifacts
          gh run download ${{ inputs.run_id }} \
            --repo ${{ github.repository }} \
            --pattern 'linux-packages-*' \
            --dir raw-packages
          # Flatten subdirectories into a single directory for publish.sh
          find raw-packages -name "*.deb" -o -name "*.rpm" | while read f; do
            cp "$f" release-artifacts/
          done

      - name: List downloaded artifacts
        run: |
          echo "Contents of release-artifacts:"
          find release-artifacts -type f | sort

      - name: Publish apt + rpm repositories to R2
        run: contrib/linux-repos/publish.sh release-artifacts

      - name: Smoke-test install (Debian)
        run: |
          TAG="${{ inputs.tag }}"
          contrib/linux-repos/smoke-test-debian.sh "${TAG#v}"

      - name: Smoke-test install (Fedora)
        run: |
          TAG="${{ inputs.tag }}"
          contrib/linux-repos/smoke-test-fedora.sh "${TAG#v}"
