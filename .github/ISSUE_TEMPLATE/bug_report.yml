name: Bug report
description: Report a problem with MCPProxy
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please search existing
        issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `mcpproxy serve` ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps so a maintainer can reproduce.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MCPProxy version
      description: Output of `mcpproxy version`
      placeholder: "v0.31.1 (personal) darwin/arm64"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Logs from `~/.mcpproxy/logs/main.log` or `mcpproxy upstream logs <name>`.
        Redact any secrets first.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I ran `mcpproxy doctor` and reviewed the output
          required: false
