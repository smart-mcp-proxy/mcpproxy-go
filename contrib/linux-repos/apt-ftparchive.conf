// apt-ftparchive config for dists/stable/Release generation.
// Run as: apt-ftparchive -c apt-ftparchive.conf release dists/stable
APT::FTPArchive::Release::Origin "MCPProxy";
APT::FTPArchive::Release::Label "MCPProxy";
APT::FTPArchive::Release::Suite "stable";
APT::FTPArchive::Release::Codename "stable";
APT::FTPArchive::Release::Architectures "amd64 arm64";
APT::FTPArchive::Release::Components "main";
APT::FTPArchive::Release::Description "MCPProxy stable release channel";
